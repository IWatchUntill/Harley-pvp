<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harley's PVP | Elite 10</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #050505; --gold: #d4af37; --panel: #0a0a0a; --border: #1a1a1a;
            --text: #ffffff; --ht: #d4af37; --lt: #a8a8a8; --danger: #ff4444; --retired: #444444;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; padding: 15px; }
        header { text-align: center; padding: 30px 0; }
        h1 { font-size: 2rem; letter-spacing: 4px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin: 0; }
        nav { display: flex; gap: 8px; border-bottom: 1px solid var(--border); margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        nav button { background: none; border: none; color: #666; padding: 12px 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        nav button.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .section { display: none; } .section.active { display: block; }
        .player-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .rank-num { font-size: 1.2rem; font-weight: 900; color: var(--gold); width: 35px; text-align: center; }
        .p-avatar { width: 50px; height: 50px; border-radius: 8px; background: #000; border: 1px solid var(--gold); }
        .p-main { flex-grow: 1; } .p-username { font-size: 1.1rem; font-weight: 800; margin: 0 0 5px 0; display: block; }
        .tier-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .t-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; border: 1px solid; text-transform: uppercase; }
        .is-ht { border-color: var(--ht); color: var(--ht); } .is-lt { border-color: var(--lt); color: var(--lt); }
        .is-retired { border-color: var(--retired); color: var(--retired); } .is-blacklisted { border-color: var(--danger); color: var(--danger); }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 6px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--gold); color: black; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>HARLEY'S PVP</h1></header>
    <nav>
        <button onclick="tab('ranks', this)" class="active">Rankings</button>
        <button onclick="tab('blacklist', this)">Blacklist</button>
        <button onclick="tab('howto', this)">Test Info</button>
        <button onclick="tab('credits', this)">Credits</button>
        <button onclick="tab('admin', this)">Admin</button>
    </nav>
    <div id="ranks" class="section active"><div id="list"></div></div>
    <div id="blacklist" class="section"><h2 style="color:var(--danger); text-align:center;">OFFICIAL BLACKLIST</h2><div id="banned-list"></div></div>
    <div id="howto" class="section"><div class="card"><h2 style="color:var(--gold)">Request a Test</h2><p>1. Join the Discord: <a href="https://discord.gg/UJ33QStdcE" style="color:var(--gold)">discord.gg/UJ33QStdcE</a></p></div></div>
    <div id="credits" class="section"><div class="card"><p><strong>Harley78s</strong> — Realm Owner</p><p><strong>Bam12362</strong> — Founder & Developer</p><p><strong>Djplayz78</strong> — CO-Founder</p></div></div>
    <div id="admin" class="section">
        <div class="card" id="lock"><input type="password" id="pass" placeholder="Password"><button class="btn" onclick="login()">Login</button></div>
        <div id="panel" style="display:none">
            <h3>Manage Player</h3>
            <input type="text" id="pName" placeholder="Gamertag">
            <select id="pKit"><option value="Sword">Sword</option><option value="Legacy">Legacy</option><option value="Axe">Axe</option><option value="UHC">UHC</option><option value="Mace">Mace</option><option value="Crystal">Crystal</option><option value="Neth Pot">Neth Pot</option><option value="Cart">Cart</option><option value="Spear Mace">Spear Mace</option></select>
            <select id="pTier"><option value="HT1">HT1</option><option value="LT1">LT1</option><option value="HT2">HT2</option><option value="LT2">LT2</option><option value="HT3">HT3</option><option value="LT3">LT3</option><option value="HT4">HT4</option><option value="LT4">LT4</option><option value="HT5">HT5</option><option value="LT5">LT5</option><option value="RETIRED">RETIRED</option><option value="BLACKLISTED">BLACKLISTED</option><option value="UNRANKED">UNRANKED</option></select>
            <button class="btn" onclick="save()">Save to Cloud</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB9cTyJW6bRIX_29WXg16w1jy7-hF8gKDg",
      authDomain: "harley-pvp-5b7a4.firebaseapp.com",
      databaseURL: "https://harley-pvp-5b7a4-default-rtdb.firebaseio.com",
      projectId: "harley-pvp-5b7a4",
      storageBucket: "harley-pvp-5b7a4.firebasestorage.app",
      messagingSenderId: "931358452197",
      appId: "1:931358452197:web:5a82b6b617fec92616270c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function tab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function login() { if(document.getElementById('pass').value === "IWatchUntill") { document.getElementById('lock').style.display = 'none'; document.getElementById('panel').style.display = 'block'; } }

    function save() {
        const name = document.getElementById('pName').value.trim();
        const kit = document.getElementById('pKit').value;
        const tier = document.getElementById('pTier').value;
        if(!name) return;
        const pRef = db.ref('players/' + name.replace(/[.#$\[\]]/g, "_"));
        pRef.once('value', (snap) => {
            let pData = snap.val() || { name, kits: {}, blacklisted: false };
            if(tier === "BLACKLISTED") { pData.blacklisted = true; pData.kits = {}; }
            else if (tier === "UNRANKED") { pData.blacklisted = false; pData.kits = {"Status": "UNRANKED"}; }
            else { 
                pData.blacklisted = false; 
                if(pData.kits["Status"]) delete pData.kits["Status"];
                pData.kits[kit] = tier;
            }
            pRef.set(pData).then(() => { alert("Saved!"); document.getElementById('pName').value = ""; });
        });
    }

    db.ref('players').on('value', (snapshot) => { render(Object.values(snapshot.val() || {})); });

    function render(allPlayers) {
        const list = document.getElementById('list');
        const bList = document.getElementById('banned-list');
        list.innerHTML = ""; bList.innerHTML = "";
        
        allPlayers.filter(p => p.blacklisted).forEach(p => bList.innerHTML += createCard(p, "!!"));

        const ranked = allPlayers.filter(p => !p.blacklisted && !p.kits["Status"]);
        ranked.sort((a,b) => a.name.localeCompare(b.name)).slice(0, 10).forEach((p, index) => {
            list.innerHTML += createCard(p, index + 1);
        });
    }

    function createCard(p, rankLabel) {
        const tiers = Object.entries(p.kits).map(([kit, tName]) => {
            let style = tName === "RETIRED" ? "is-retired" : (tName.includes('HT') ? 'is-ht' : 'is-lt');
            let displayLabel = tName === "RETIRED" ? `Retired | ${kit} | ${tName}` : `${kit} | ${tName}`;
            if(kit === "Status") displayLabel = tName;
            return `<div class="t-badge ${style}">${displayLabel}</div>`;
        }).join('');
        return `<div class="player-card">
            <div class="rank-num">${rankLabel === "!!" ? "!!" : "#" + rankLabel}</div>
            <img class="p-avatar" src="https://api.geysermc.org/v2/skin/${p.name.replace(/[._]/g, '')}" onerror="this.src='https://mc-heads.net/avatar/${p.name}';">
            <div class="p-main"><span class="p-username">${p.name}</span><div class="tier-list">${p.blacklisted ? '<div class="t-badge is-blacklisted">BLACKLISTED</div>' : tiers}</div></div>
        </div>`;
    }
</script>
</body>
</html>
